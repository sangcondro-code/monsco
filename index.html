<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Monsco</title>

    <!-- ===== Bahan PWA #1: Manifest — supaya "Add to Home Screen" bikin ikon
         app beneran (bukan cuma shortcut Safari) dan bisa dibuka fullscreen
         tanpa address bar (display:"standalone" di manifest.json). ===== -->
    <link rel="manifest" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/manifest.json">

    <!-- ===== Bahan PWA #2: Ikon-ikon — biar homescreen icon rapi, bukan
         generic/pecah, di iOS maupun Android. ===== -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/icon-512.png">

    <!-- Meta iOS/Android home screen: ini yang bikin standalone-nya jalan -->
    <meta name="apple-mobile-web-app-title" content="Monsco">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#005CAA">

    <style>
        /* Menghapus margin dan padding bawaan browser agar benar-benar penuh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda di luar iframe */
            background-color: #ffffff; /* Latar belakang putih saat iframe loading */
        }

        /* Mengatur iframe agar memenuhi seluruh layar */
        .gas-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none; /* Menghilangkan garis bingkai iframe */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbw_5SZH1TsqEJ8LVVTsAe1LnO3xnKCpi7S-XLe__zI-aTI120HzqsvypNCoAzqlUWR2/exec" 
        class="gas-iframe" 
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

    <!-- ===== Bahan PWA #3: Service Worker — cache shell (bukan konten
         Apps Script-nya, itu tetap selalu fresh dari network) supaya app
         ini kelihatan instan di kunjungan kedua dst. ===== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function (err) {
                    console.warn('SW register gagal:', err);
                });
            });
        }
    </script>

</body>
</html>
