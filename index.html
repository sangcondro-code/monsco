<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- PERBAIKAN: tambah viewport-fit=cover. Tanpa ini, di iPhone dengan
         notch/Dynamic Island/home-indicator, area "aman" (safe-area-inset)
         di bawah tidak dikenali browser sama sekali — jadi env(safe-area-inset-*)
         di CSS bawah tidak akan pernah bernilai apa-apa walau sudah ditulis.
         Ini salah satu sumber paling umum dari bug "gap putih di bawah" yang
         Anda maksud, jadi sengaja diperbaiki di sini juga. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Monsco</title>

    <!-- PERF: preconnect/dns-prefetch — HANYA network hint (mulai DNS+TLS
         lebih awal), TIDAK menyentuh CSS/layout/ukuran elemen sama sekali,
         jadi tidak mungkin menyebabkan bug geser/gap apa pun. script.google.com
         adalah yang paling penting di sini karena itu tujuan <iframe> di bawah —
         percepatan ini murni memangkas waktu sebelum iframe mulai memuat. -->
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Ikon — ini yang bikin homescreen icon rapi (bukan huruf "M" default),
         dan favicon di tab browser. TIDAK butuh manifest.json sama sekali,
         ini fitur bawaan Apple/browser sendiri yang independen dari PWA. -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/apple-touch-icon.png">

    <!-- Bikin fullscreen (tanpa address bar Safari) pas dibuka dari
         homescreen — juga tidak butuh manifest.json. -->
    <meta name="apple-mobile-web-app-title" content="Monsco">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005CAA">
    <style>
        /* Menghapus margin dan padding bawaan browser agar benar-benar penuh */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* PERBAIKAN BUG GAP BOTTOM IPHONE:
               height:100% lama mengacu ke tinggi viewport versi "lama" yang
               dihitung Safari SEBELUM address bar/toolbar-nya menyusut saat
               discroll — begitu toolbar menyusut/hilang, viewport sebenarnya
               jadi lebih tinggi dari 100% tadi, dan area tambahan itu yang
               kelihatan sebagai gap putih di bawah karena iframe absolute
               di bawahnya tidak ikut membesar.
               100dvh ("dynamic viewport height") mengikuti tinggi viewport
               YANG SEBENARNYA saat ini secara live, termasuk saat toolbar
               Safari berubah — inilah unit yang didesain khusus untuk kasus
               ini. Ditulis SETELAH height:100% (bukan menggantikannya) supaya
               browser lama yang belum kenal dvh otomatis tetap pakai 100%
               sebagai fallback, tidak pecah. */
            height: 100%;
            height: 100dvh;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda di luar iframe */
            background-color: #ffffff; /* Latar belakang putih saat iframe loading */
        }

        /* Mengatur iframe agar memenuhi seluruh layar */
        .gas-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Sama seperti html,body di atas: 100dvh mengikuti tinggi
               viewport asli yang sebenarnya (termasuk saat toolbar Safari
               berubah dan area safe-zone iPhone), jadi cukup satu unit ini
               saja tanpa perlu tambahan env(safe-area-inset-bottom) manual —
               menambah itu justru berisiko bikin iframe melebihi viewport. */
            height: 100dvh;
            border: none; /* Menghilangkan garis bingkai iframe */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbw_5SZH1TsqEJ8LVVTsAe1LnO3xnKCpi7S-XLe__zI-aTI120HzqsvypNCoAzqlUWR2/exec" 
        class="gas-iframe" 
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

</body>
</html>
