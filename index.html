<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Monsco</title>

    <!-- Preconnect: mulai koneksi ke domain penting lebih awal,
         supaya request iframe & icon ga nunggu DNS/TLS dari nol -->
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Ikon — bikin homescreen icon rapi (bukan huruf "M" default),
         dan favicon di tab browser. TIDAK butuh manifest.json sama sekali,
         ini fitur bawaan Apple/browser sendiri yang independen dari PWA. -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/apple-touch-icon.png">

    <!-- Bikin fullscreen (tanpa address bar Safari) pas dibuka dari
         homescreen — juga tidak butuh manifest.json. -->
    <meta name="apple-mobile-web-app-title" content="Monsco">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#005CAA">

    <style>
        /* Menghapus margin dan padding bawaan browser agar benar-benar penuh.
           FIX strip putih di bawah saat standalone iOS:
           - pakai position:fixed + inset:0 (bukan height:100%), karena
             height:100% di iOS standalone sering dihitung salah / ga update
             saat address bar/home indicator area berubah.
           - 100dvh sebagai fallback tambahan untuk browser yang support. */
        html {
            height: 100%;
            background-color: #005CAA;
        }

        body {
            margin: 0;
            padding: 0;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; /* dynamic viewport height, lebih akurat di mobile */
            overflow: hidden;
            background-color: #005CAA; /* Samain dengan theme-color, biar transisi mulus, bukan putih polos */
        }

        /* Splash screen: tampil INSTAN saat app dibuka, sebelum iframe siap.
           Ini yang bikin kesan "app-like" — bukan blank/white screen. */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #005CAA;
            z-index: 999;
            transition: opacity 0.35s ease;
        }

        #splash img {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.94); opacity: 0.85; }
        }

        #splash .spinner {
            margin-top: 24px;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.35);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #splash.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Mengatur iframe agar memenuhi seluruh layar (fixed, bukan absolute,
           supaya konsisten dengan body dan ga kena bug height iOS) */
        .gas-iframe {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            border: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gas-iframe.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Splash muncul duluan, instan, tanpa nunggu apa pun -->
    <div id="splash">
        <img src="https://cdn.jsdelivr.net/gh/sangcondro-code/Monsco@main/apple-touch-icon.png" alt="Monsco">
        <div class="spinner"></div>
    </div>

    <iframe
        id="gasFrame"
        src="https://script.google.com/macros/s/AKfycbw_5SZH1TsqEJ8LVVTsAe1LnO3xnKCpi7S-XLe__zI-aTI120HzqsvypNCoAzqlUWR2/exec"
        class="gas-iframe"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true">
    </iframe>

    <script>
        // Fallback untuk iOS lama yang belum kenal unit "dvh":
        // set tinggi pakai window.innerHeight secara manual via JS,
        // dan update lagi tiap resize (misal saat rotate, atau saat
        // address bar Safari muncul/hilang di mode non-standalone).
        function fixHeight() {
            var vh = window.innerHeight + 'px';
            document.body.style.height = vh;
            document.getElementById('gasFrame').style.height = vh;
        }
        fixHeight();
        window.addEventListener('resize', fixHeight);
        window.addEventListener('orientationchange', function () {
            setTimeout(fixHeight, 100);
        });

        var frame = document.getElementById('gasFrame');
        var splash = document.getElementById('splash');

        function reveal() {
            frame.classList.add('loaded');
            splash.classList.add('hide');
            setTimeout(function () { splash.style.display = 'none'; }, 400);
        }

        frame.addEventListener('load', reveal);

        // Jaga-jaga: kalau load event ga fire (kadang terjadi di iOS webview
        // untuk cross-origin iframe), paksa tampil setelah 4 detik supaya
        // splash ga nyangkut selamanya.
        setTimeout(reveal, 4000);
    </script>

</body>
</html>
